name: Test & Coverage
on: [pull_request]
jobs:
  test_and_coverage:
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1
    strategy:
      matrix:
        rust: [nightly]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: llvm-tools-preview
      - name: Information
        run: |
          lsb_release -d
          rustup --version
      - name: Compile MUMPS
        run: |
          bash zscripts/debian-compile-mumps.bash
      - name: Compile SuiteSparse
        run: |
          bash zscripts/debian-compile-suitesparse.bash
      - name: Run tests
        run: |
          cargo test --features local_sparse
      - name: Install cargo-llvm-cov
        if: matrix.rust == 'nightly'
        run: |
          curl -LsSf https://github.com/taiki-e/cargo-llvm-cov/releases/latest/download/cargo-llvm-cov-x86_64-unknown-linux-gnu.tar.gz | tar xzf - -C ~/.cargo/bin
      - name: Generate code coverage
        if: matrix.rust == 'nightly'
        run: |
          cargo llvm-cov --workspace --features local_sparse --ignore-filename-regex 'build.rs|mem_check.rs|mem_check_lab.rs|solve_matrix_market.rs|amplifier1t.rs|brusselator_pde.rs' --lcov --output-path lcov.info
      - name: Upload to codecov.io
        if: matrix.rust == 'nightly'
        uses: codecov/codecov-action@v4
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          files: lcov.info
          fail_ci_if_error: true
