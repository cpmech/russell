name: Test with Intel MKL
on:
  workflow_dispatch: # Allows manual triggering from the web browser
    inputs:
      pr_branch:
        description: 'Branch name of the PR to test'
        required: true
        default: 'main'

jobs:
  test_with_intel_mkl:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.pr_branch }} # Checks out the user-specified branch
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Information
        run: |
          lsb_release -d
          rustup --version
      - name: Compile MUMPS
        run: |
          bash zscripts/compile-and-install-mumps.bash mkl
      - name: Compile SuiteSparse
        run: |
          bash zscripts/compile-and-install-suitesparse.bash mkl
      - name: Run tests
        run: |
          RUST_BACKTRACE=1 cargo test --features local_suitesparse,with_mumps,intel_mkl
