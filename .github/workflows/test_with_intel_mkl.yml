name: Test with Intel MKL
on:
  workflow_dispatch:
jobs:
  test_with_intel_mkl:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Information
        run: |
          lsb_release -d
          rustup --version
      - name: Install Intel MKL
        run: |
          bash zscripts/debian-install-intel-toolkit.bash
      - name: Compile MUMPS
        run: |
          bash zscripts/debian-compile-mumps.bash 1
      - name: Compile SuiteSparse
        run: |
          bash zscripts/debian-compile-suitesparse.bash 1
      - name: Run tests
        run: |
          RUST_BACKTRACE=1 cargo test --features intel_mkl,local_sparse
